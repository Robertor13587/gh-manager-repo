<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="octopusGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle (dark) -->
  <circle cx="100" cy="100" r="95" fill="#1f2937" stroke="#374151" stroke-width="2"/>

  <!-- Dashboard grid background -->
  <g opacity="0.15">
    <rect x="50" y="50" width="30" height="30" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="110" y="50" width="30" height="30" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="50" y="110" width="30" height="30" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="110" y="110" width="30" height="30" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <!-- Octopus head (circle) -->
  <circle cx="100" cy="85" r="25" fill="url(#octopusGradientDark)" stroke="#60a5fa" stroke-width="1.5"/>

  <!-- Octopus eyes -->
  <circle cx="93" cy="80" r="4" fill="#1f2937"/>
  <circle cx="107" cy="80" r="4" fill="#1f2937"/>
  <circle cx="93.5" cy="79" r="2" fill="#60a5fa"/>
  <circle cx="107.5" cy="79" r="2" fill="#60a5fa"/>

  <!-- Octopus tentacles (8 wavy lines) -->
  <!-- Top left tentacle -->
  <path d="M 85 105 Q 75 120 80 140" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Top right tentacle -->
  <path d="M 115 105 Q 125 120 120 140" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Middle left tentacles -->
  <path d="M 80 100 Q 65 115 70 135" stroke="#93c5fd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 77 98 Q 55 120 65 145" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Middle right tentacles -->
  <path d="M 120 100 Q 135 115 130 135" stroke="#93c5fd" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 123 98 Q 145 120 135 145" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom tentacles -->
  <path d="M 95 107 Q 90 125 95 150" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 105 107 Q 110 125 105 150" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Dashboard accent elements -->
  <g opacity="0.7">
    <circle cx="65" cy="65" r="2.5" fill="#60a5fa"/>
    <circle cx="135" cy="65" r="2.5" fill="#60a5fa"/>
    <circle cx="65" cy="135" r="2.5" fill="#60a5fa"/>
    <circle cx="135" cy="135" r="2.5" fill="#60a5fa"/>
  </g>

  <!-- Center accent dot -->
  <circle cx="100" cy="100" r="1.5" fill="#60a5fa" opacity="0.5"/>
</svg>