<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define a gradient -->
  <defs>
    <linearGradient id="octopusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Dashboard grid background -->
  <g opacity="0.08">
    <rect x="50" y="50" width="30" height="30" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="110" y="50" width="30" height="30" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="50" y="110" width="30" height="30" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="110" y="110" width="30" height="30" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

  <!-- Octopus head (circle) -->
  <circle cx="100" cy="85" r="25" fill="url(#octopusGradient)" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Octopus eyes -->
  <circle cx="93" cy="80" r="4" fill="white"/>
  <circle cx="107" cy="80" r="4" fill="white"/>
  <circle cx="93.5" cy="79" r="2" fill="#3b82f6"/>
  <circle cx="107.5" cy="79" r="2" fill="#3b82f6"/>

  <!-- Octopus tentacles (8 wavy lines) -->
  <!-- Top left tentacle -->
  <path d="M 85 105 Q 75 120 80 140" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Top right tentacle -->
  <path d="M 115 105 Q 125 120 120 140" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Middle left tentacles -->
  <path d="M 80 100 Q 65 115 70 135" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 77 98 Q 55 120 65 145" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Middle right tentacles -->
  <path d="M 120 100 Q 135 115 130 135" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 123 98 Q 145 120 135 145" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Bottom tentacles -->
  <path d="M 95 107 Q 90 125 95 150" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 105 107 Q 110 125 105 150" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Dashboard accent elements -->
  <g opacity="0.6">
    <circle cx="65" cy="65" r="2.5" fill="#3b82f6"/>
    <circle cx="135" cy="65" r="2.5" fill="#3b82f6"/>
    <circle cx="65" cy="135" r="2.5" fill="#3b82f6"/>
    <circle cx="135" cy="135" r="2.5" fill="#3b82f6"/>
  </g>

  <!-- Center accent dot -->
  <circle cx="100" cy="100" r="1.5" fill="#3b82f6" opacity="0.4"/>
</svg>