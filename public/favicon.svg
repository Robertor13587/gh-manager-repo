<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#ffffff"/>

  <!-- Octopus head -->
  <circle cx="90" cy="70" r="22" fill="url(#faviconGradient)" stroke="#1f2937" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="83" cy="65" r="3.5" fill="white"/>
  <circle cx="97" cy="65" r="3.5" fill="white"/>
  <circle cx="83.5" cy="64" r="1.5" fill="#3b82f6"/>
  <circle cx="97.5" cy="64" r="1.5" fill="#3b82f6"/>

  <!-- Tentacles simplified -->
  <path d="M 78 88 Q 65 105 70 130" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 102 88 Q 115 105 110 130" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 83 90 Q 70 110 78 135" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 97 90 Q 110 110 102 135" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Dashboard indicator dots -->
  <circle cx="55" cy="55" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="125" cy="55" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="55" cy="125" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="125" cy="125" r="2" fill="#3b82f6" opacity="0.6"/>
</svg>